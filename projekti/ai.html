
    <!-- AI Assistant Widget -->
    <div id="aiChatWidget" class="card position-fixed bottom-0 start-0 m-3 shadow-lg d-none" style="width: 320px; height: 450px; z-index: 2000;">
      <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
        <span class="fw-bold">AI Assistant</span>
        <button type="button" class="btn-close btn-close-white" aria-label="Close" onclick="toggleAiChat()"></button>
      </div>
      <div class="card-body overflow-auto bg-body-tertiary" id="aiChatBody">
        <div class="d-flex flex-row justify-content-start mb-2">
          <div class="p-2 bg-white border rounded">Hello! I am your AI assistant. How can I help you today?</div>
        </div>
      </div>
      <div class="card-footer bg-white">
        <div class="input-group">
          <input type="text" id="aiChatInput" class="form-control" placeholder="Ask something...">
          <button class="btn btn-primary" type="button" onclick="sendAiMessage()">Send</button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary rounded-circle position-fixed bottom-0 start-0 m-4 shadow" onclick="toggleAiChat()" style="width: 60px; height: 60px; z-index: 1999;" aria-label="Open AI Chat">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
        <path d="M6 12.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5ZM3 8.062C3 6.76 4.235 5.765 5.53 5.886a26.58 26.58 0 0 0 4.94 0C11.765 5.765 13 6.76 13 8.062v1.157a.933.933 0 0 1-.765.935c-.845.147-2.34.346-4.235.346-1.895 0-3.39-.2-4.235-.346A.933.933 0 0 1 3 9.219V8.062Zm4.542-.827a.25.25 0 0 0-.217.068l-.92.9a24.767 24.767 0 0 1-1.871-.183.25.25 0 0 0-.068.495c.55.076 1.232.149 2.02.193a.25.25 0 0 0 .189-.071l.754-.736.847 1.71a.25.25 0 0 0 .404.062l.932-.97a25.286 25.286 0 0 0 1.922-.188.25.25 0 0 0-.068-.495c-.538.074-1.207.145-1.98.189a.25.25 0 0 0-.166.076l-.754.785-.958-1.935a.25.25 0 0 0-.165-.14ZM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"/>
      </svg>
    </button>

    <script>
      function toggleAiChat() {
        const widget = document.getElementById('aiChatWidget');
        if (widget.classList.contains('d-none')) {
          widget.classList.remove('d-none');
          setTimeout(() => document.getElementById('aiChatInput').focus(), 100);
        } else {
          widget.classList.add('d-none');
        }
      }
      function sendAiMessage() {
        const input = document.getElementById('aiChatInput');
        const body = document.getElementById('aiChatBody');
        const text = input.value.trim();
        if (!text) return;
        const userDiv = document.createElement('div');
        userDiv.className = 'd-flex flex-row justify-content-end mb-2';
        userDiv.innerHTML = `<div class="p-2 bg-primary text-white rounded">${text}</div>`;
        body.appendChild(userDiv);
        input.value = '';
        body.scrollTop = body.scrollHeight;
        setTimeout(() => {
          const botDiv = document.createElement('div');
          botDiv.className = 'd-flex flex-row justify-content-start mb-2';
          botDiv.innerHTML = `<div class="p-2 bg-white border rounded">I'm a simulated AI helper. You said: "${text}"</div>`;
          body.appendChild(botDiv);
          body.scrollTop = body.scrollHeight;
        }, 800);
      }
      document.getElementById('aiChatInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendAiMessage();
      });
    </script>
